<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self'">
  <title>Wake on LAN</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Wake on LAN</h1>
    <button id="btn-add" class="btn btn-add">+ Add Host</button>
  </header>

  <main id="host-list">
    <div id="empty-state" class="empty-state">
      <p>No hosts configured</p>
    </div>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">Add Host</h2>
      <form id="host-form">
        <div class="form-group">
          <label for="field-name">Hostname</label>
          <input type="text" id="field-name" required placeholder="e.g. Gaming PC">
          <span class="field-error" id="error-name"></span>
        </div>
        <div class="form-group">
          <label for="field-mac">MAC Address</label>
          <input type="text" id="field-mac" required placeholder="AA:BB:CC:DD:EE:FF">
          <span class="field-error" id="error-mac"></span>
        </div>
        <div class="form-group">
          <label for="field-ip">IP Address</label>
          <input type="text" id="field-ip" required placeholder="192.168.1.100">
          <span class="field-error" id="error-ip"></span>
        </div>
        <div class="form-group">
          <label for="field-broadcast">Broadcast Address</label>
          <input type="text" id="field-broadcast" required placeholder="192.168.1.255">
          <span class="field-error" id="error-broadcast"></span>
        </div>
        <div class="form-group">
          <label for="field-port">Port</label>
          <input type="number" id="field-port" value="9" min="1" max="65535">
          <span class="field-error" id="error-port"></span>
        </div>
        <div class="form-group form-group-checkbox">
          <label>
            <input type="checkbox" id="field-direct-ip">
            Send to IP directly (skip broadcast)
          </label>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
